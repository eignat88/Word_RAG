version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: word-rag-postgres
    environment:
      POSTGRES_DB: word_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
